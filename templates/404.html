{% extends "base.html" %}
{% load i18n %}

{% block title %}404 - Page Not Found | EduVillage{% endblock %}

{% block content %}
<div class="container d-flex flex-column align-items-center justify-content-center" style="min-height: 60vh;">
    <div class="text-center">
        <h1 class="display-1 fw-bold text-primary">404</h1>
        <h2 class="h2 mb-4">Page Not Found</h2>
        <p class="lead text-muted mb-5">
            The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
        </p>
        <a href="{% url 'index' %}" class="btn btn-primary btn-lg rounded-pill px-5 shadow-sm">
            <i class="bi bi-house-door-fill me-2"></i>Go Home
        </a>
    </div>
</div>
{% endblock %}
